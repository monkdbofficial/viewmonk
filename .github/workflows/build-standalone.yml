name: Build Standalone Package

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'standalone-v*'  # e.g., standalone-v1.0.0
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-standalone:
    name: Build Standalone Web Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run standalone build script (without node_modules)
        run: |
          chmod +x build-standalone.sh
          ./build-standalone.sh

      - name: Display build size (without node_modules)
        run: |
          du -sh dist-standalone
          echo "Build size without node_modules: $(du -sh dist-standalone | cut -f1)"

      - name: Copy dist-standalone for full version
        run: |
          cp -r dist-standalone dist-standalone-full

      - name: Add node_modules to full version
        run: |
          echo "📦 Creating full version with node_modules..."
          cp -r node_modules dist-standalone-full/
          du -sh dist-standalone-full
          echo "Full build size with node_modules: $(du -sh dist-standalone-full | cut -f1)"

      - name: Create version file
        run: |
          VERSION="${GITHUB_REF#refs/tags/standalone-v}"
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="${GITHUB_SHA:0:7}"
          fi
          echo "$VERSION" > dist-standalone/VERSION.txt
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist-standalone/VERSION.txt
          echo "BUILD_REF=$GITHUB_REF" >> dist-standalone/VERSION.txt

      - name: Create archives (LITE version - without node_modules)
        run: |
          echo "📦 Creating LITE version (~5MB)..."
          cd dist-standalone
          zip -r ../monkdb-workbench-standalone-lite.zip .
          cd ..
          tar -czf monkdb-workbench-standalone-lite.tar.gz -C dist-standalone .

      - name: Create archives (FULL version - with node_modules)
        run: |
          echo "📦 Creating FULL version (~366MB)..."
          cd dist-standalone-full
          zip -r ../monkdb-workbench-standalone-full.zip .
          cd ..
          tar -czf monkdb-workbench-standalone-full.tar.gz -C dist-standalone-full .

      - name: Calculate checksums
        run: |
          sha256sum monkdb-workbench-standalone-lite.zip > monkdb-workbench-standalone-lite.zip.sha256
          sha256sum monkdb-workbench-standalone-lite.tar.gz > monkdb-workbench-standalone-lite.tar.gz.sha256
          sha256sum monkdb-workbench-standalone-full.zip > monkdb-workbench-standalone-full.zip.sha256
          sha256sum monkdb-workbench-standalone-full.tar.gz > monkdb-workbench-standalone-full.tar.gz.sha256

      - name: Upload LITE ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-zip
          path: |
            monkdb-workbench-standalone-lite.zip
            monkdb-workbench-standalone-lite.zip.sha256

      - name: Upload LITE TAR.GZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-tar
          path: |
            monkdb-workbench-standalone-lite.tar.gz
            monkdb-workbench-standalone-lite.tar.gz.sha256

      - name: Upload FULL ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-zip
          path: |
            monkdb-workbench-standalone-full.zip
            monkdb-workbench-standalone-full.zip.sha256

      - name: Upload FULL TAR.GZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-tar
          path: |
            monkdb-workbench-standalone-full.tar.gz
            monkdb-workbench-standalone-full.tar.gz.sha256

  # Create GitHub Release when a tag is pushed
  create-release:
    name: Create GitHub Release
    needs: build-standalone
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/standalone-v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/standalone-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download LITE ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-zip
          path: release-files

      - name: Download LITE TAR.GZ artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-tar
          path: release-files

      - name: Download FULL ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-zip
          path: release-files

      - name: Download FULL TAR.GZ artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-tar
          path: release-files

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | grep "^standalone-v" || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -n 20)
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.md

          # Set output
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release in Public Repo
        uses: softprops/action-gh-release@v1
        with:
          repository: suryakant-monkdb/monkdb-view-releases
          tag_name: standalone-v${{ steps.version.outputs.version }}
          name: MonkDB Workbench Standalone v${{ steps.version.outputs.version }}
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          body: |
            ## MonkDB Workbench Standalone v${{ steps.version.outputs.version }}

            ### 📦 Standalone Web Package

            This is a standalone, portable build of MonkDB Workbench that can be run on any system with Node.js installed.


            ### 🎯 What's Included

            - ✅ Complete Next.js application with all dependencies
            - ✅ Ready-to-run server (no build step required)
            - ✅ Zero configuration - works out of the box!
            - ✅ Cross-platform support (Windows, macOS, Linux)
            - ✅ Simple start scripts for each platform
            - ✅ Production-optimized build
            - ✅ No API keys needed - uses Leaflet & OpenStreetMap

            ### 📥 Download Options

            **Choose the version that fits your needs:**

            #### LITE Version (~5MB) - Recommended
            - **monkdb-workbench-standalone-lite.zip** - Windows/macOS users
            - **monkdb-workbench-standalone-lite.tar.gz** - Linux users
            - Smaller download, faster transfer
            - Auto-installs dependencies on first run (requires internet)
            - Perfect for: Sharing via email, slow connections

            #### FULL Version (~366MB) - Ready to Run
            - **monkdb-workbench-standalone-full.zip** - Windows/macOS users
            - **monkdb-workbench-standalone-full.tar.gz** - Linux users
            - Includes all node_modules pre-installed
            - No internet needed after download
            - Perfect for: Offline environments, air-gapped systems

            ### 🚀 Quick Start

            #### Requirements
            - Node.js 18+ installed ([Download here](https://nodejs.org/))
            - Port 3000 available (or set custom PORT)

            #### Installation Steps

            1. **Download and extract** the archive for your platform
            2. **Navigate** to the extracted folder
            3. **Run the application**:

               - **Linux/macOS**: `./start.sh`
               - **Windows**: Double-click `start.bat` or run `node server.js`

            4. **Open browser** at http://localhost:3000

            That's it! No configuration needed. The application works out of the box with Leaflet maps (OpenStreetMap) - no API keys required!

            #### Custom Port (Optional)

            ```bash
            # Linux/macOS
            PORT=8080 ./start.sh

            # Windows
            set PORT=8080 && node server.js
            ```

            ### 📋 What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ### 🔐 Checksums

            SHA256 checksums are included for verification:
            - `monkdb-workbench-standalone.zip.sha256`
            - `monkdb-workbench-standalone.tar.gz.sha256`

            To verify:
            ```bash
            # Linux/macOS
            sha256sum -c monkdb-workbench-standalone.tar.gz.sha256

            # Windows (PowerShell)
            Get-FileHash monkdb-workbench-standalone.zip -Algorithm SHA256
            ```

            ### 📖 Documentation

            See the included `README.md` in the package for detailed instructions.

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on success
        run: |
          echo "✅ Release created successfully in public repository!"
          echo "📦 Public download page:"
          echo "🔗 https://github.com/suryakant-monkdb/monkdb-view-releases/releases/tag/standalone-v${{ steps.version.outputs.version }}"
          echo ""
          echo "✨ Users can download without GitHub account!"
          echo "📋 No source code - only standalone builds"
