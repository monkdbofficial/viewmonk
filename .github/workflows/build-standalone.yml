name: Build Standalone Package

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'standalone-v*'  # e.g., standalone-v1.0.0
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-standalone:
    name: Build Standalone Web Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run standalone build script (without node_modules)
        run: |
          chmod +x build-standalone.sh
          ./build-standalone.sh

      - name: Display build size (without node_modules)
        run: |
          du -sh dist-standalone
          echo "Build size without node_modules: $(du -sh dist-standalone | cut -f1)"

      - name: Copy dist-standalone for full version
        run: |
          cp -r dist-standalone dist-standalone-full

      - name: Add node_modules to full version
        run: |
          echo "📦 Creating full version with node_modules..."
          cp -r node_modules dist-standalone-full/
          du -sh dist-standalone-full
          echo "Full build size with node_modules: $(du -sh dist-standalone-full | cut -f1)"

      - name: Create version file
        run: |
          VERSION="${GITHUB_REF#refs/tags/standalone-v}"
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="${GITHUB_SHA:0:7}"
          fi
          echo "$VERSION" > dist-standalone/VERSION.txt
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist-standalone/VERSION.txt
          echo "BUILD_REF=$GITHUB_REF" >> dist-standalone/VERSION.txt

      - name: Create archives (LITE version - without node_modules)
        run: |
          echo "📦 Creating LITE version (~5MB)..."
          cd dist-standalone
          zip -r ../monkdb-workbench-standalone-lite.zip .
          cd ..
          tar -czf monkdb-workbench-standalone-lite.tar.gz -C dist-standalone .

      - name: Create archives (FULL version - with node_modules)
        run: |
          echo "📦 Creating FULL version (~366MB)..."
          cd dist-standalone-full
          zip -r ../monkdb-workbench-standalone-full.zip .
          cd ..
          tar -czf monkdb-workbench-standalone-full.tar.gz -C dist-standalone-full .

      - name: Calculate checksums
        run: |
          sha256sum monkdb-workbench-standalone-lite.zip > monkdb-workbench-standalone-lite.zip.sha256
          sha256sum monkdb-workbench-standalone-lite.tar.gz > monkdb-workbench-standalone-lite.tar.gz.sha256
          sha256sum monkdb-workbench-standalone-full.zip > monkdb-workbench-standalone-full.zip.sha256
          sha256sum monkdb-workbench-standalone-full.tar.gz > monkdb-workbench-standalone-full.tar.gz.sha256

      - name: Upload LITE ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-zip
          path: |
            monkdb-workbench-standalone-lite.zip
            monkdb-workbench-standalone-lite.zip.sha256

      - name: Upload LITE TAR.GZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-tar
          path: |
            monkdb-workbench-standalone-lite.tar.gz
            monkdb-workbench-standalone-lite.tar.gz.sha256

      - name: Upload FULL ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-zip
          path: |
            monkdb-workbench-standalone-full.zip
            monkdb-workbench-standalone-full.zip.sha256

      - name: Upload FULL TAR.GZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-tar
          path: |
            monkdb-workbench-standalone-full.tar.gz
            monkdb-workbench-standalone-full.tar.gz.sha256

  # Upload to Cloudflare R2 when a tag is pushed
  upload-to-r2:
    name: Upload to Cloudflare R2
    needs: build-standalone
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/standalone-v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/standalone-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download LITE ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-zip
          path: release-files

      - name: Download LITE TAR.GZ artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite-tar
          path: release-files

      - name: Download FULL ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-zip
          path: release-files

      - name: Download FULL TAR.GZ artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-full-tar
          path: release-files

      - name: Configure AWS CLI for R2
        run: |
          pip install awscli
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload files to Cloudflare R2
        run: |
          echo "📦 Uploading standalone builds to R2..."

          # Upload LITE version
          aws s3 cp release-files/monkdb-workbench-standalone-lite.zip \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-lite.zip \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-lite.zip.sha256 \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-lite.zip.sha256 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-lite.tar.gz \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-lite.tar.gz \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-lite.tar.gz.sha256 \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-lite.tar.gz.sha256 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          # Upload FULL version
          aws s3 cp release-files/monkdb-workbench-standalone-full.zip \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-full.zip \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-full.zip.sha256 \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-full.zip.sha256 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-full.tar.gz \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-full.tar.gz \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-full.tar.gz.sha256 \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/v${{ steps.version.outputs.version }}/monkdb-workbench-standalone-full.tar.gz.sha256 \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          echo "✅ All files uploaded successfully!"

      - name: Upload latest version (without version folder)
        run: |
          echo "📦 Uploading as 'latest' version..."

          # Copy files to /latest/ folder for easy access
          aws s3 cp release-files/monkdb-workbench-standalone-lite.zip \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/latest/monkdb-workbench-standalone-lite.zip \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-lite.tar.gz \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/latest/monkdb-workbench-standalone-lite.tar.gz \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-full.zip \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/latest/monkdb-workbench-standalone-full.zip \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          aws s3 cp release-files/monkdb-workbench-standalone-full.tar.gz \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/latest/monkdb-workbench-standalone-full.tar.gz \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read

          echo "✅ Latest version updated!"

      - name: Upload download page
        run: |
          echo "📄 Uploading download page..."

          # Upload as index.html in releases root
          aws s3 cp download-page.html \
            s3://${{ secrets.R2_BUCKET_NAME }}/releases/index.html \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read \
            --content-type text/html

          echo "✅ Download page uploaded!"
          echo "🌐 Access at: ${{ secrets.R2_PUBLIC_URL }}/releases/index.html"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null | grep "^standalone-v" || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges -n 20)
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.md

          # Set output
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Comment on success
        run: |
          echo "✅ Files uploaded successfully to Cloudflare R2!"
          echo ""
          echo "📦 Download Links:"
          echo "🔗 LITE ZIP: ${{ secrets.R2_PUBLIC_URL }}/releases/latest/monkdb-workbench-standalone-lite.zip"
          echo "🔗 LITE TAR: ${{ secrets.R2_PUBLIC_URL }}/releases/latest/monkdb-workbench-standalone-lite.tar.gz"
          echo "🔗 FULL ZIP: ${{ secrets.R2_PUBLIC_URL }}/releases/latest/monkdb-workbench-standalone-full.zip"
          echo "🔗 FULL TAR: ${{ secrets.R2_PUBLIC_URL }}/releases/latest/monkdb-workbench-standalone-full.tar.gz"
          echo ""
          echo "✨ No GitHub account needed to download!"
          echo "🎯 NO source code - only standalone builds!"
