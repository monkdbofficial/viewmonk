name: Build Standalone Package

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'standalone-v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-standalone:
    name: Build Standalone Web Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Show environment info
        run: |
          node --version
          npm --version
          uname -a
          df -h

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

      - name: Create dist-standalone directory
        run: mkdir -p dist-standalone

      - name: Copy Next.js build output
        run: cp -r .next dist-standalone/

      - name: Copy public assets
        run: cp -r public dist-standalone/ 2>/dev/null || true

      - name: Copy package files
        run: |
          cp package.json dist-standalone/
          cp package-lock.json dist-standalone/

      - name: Write server.js
        run: |
          cat > dist-standalone/server.js << 'EOF'
          const { createServer } = require('http');
          const { parse } = require('url');
          const next = require('next');
          const fs = require('fs');
          const path = require('path');

          function loadEnvFile(filepath) {
            if (!fs.existsSync(filepath)) return;
            const content = fs.readFileSync(filepath, 'utf8');
            content.split('\n').forEach(line => {
              line = line.trim();
              if (!line || line.startsWith('#')) return;
              const match = line.match(/^([^=]+)=(.*)$/);
              if (match) {
                const key = match[1].trim();
                const value = match[2].trim();
                if (!process.env[key]) process.env[key] = value;
              }
            });
          }

          ['.env', '.env.local'].forEach(f => loadEnvFile(path.join(__dirname, f)));

          const dev = false;
          const hostname = '0.0.0.0';
          const port = parseInt(process.env.PORT || '3000', 10);
          const app = next({ dev, hostname, port, dir: __dirname });
          const handle = app.getRequestHandler();

          app.prepare().then(() => {
            createServer(async (req, res) => {
              try {
                await handle(req, res, parse(req.url, true));
              } catch (err) {
                console.error('Error handling', req.url, err);
                res.statusCode = 500;
                res.end('internal server error');
              }
            }).listen(port, err => {
              if (err) throw err;
              console.log(`> Ready on http://localhost:${port}`);
            });
          });
          EOF

      - name: Write start scripts
        run: |
          cat > dist-standalone/start.sh << 'EOF'
          #!/bin/bash
          if [ ! -d "node_modules" ]; then
            echo "Installing dependencies (first run only)..."
            npm ci --production --no-audit
          fi
          PORT=${PORT:-3000} NODE_ENV=production node server.js
          EOF
          chmod +x dist-standalone/start.sh

          cat > dist-standalone/start.bat << 'EOF'
          @echo off
          if not exist "node_modules\" (
            echo Installing dependencies...
            call npm ci --production --no-audit
          )
          set PORT=3000
          set NODE_ENV=production
          node server.js
          EOF

      - name: Write version file
        run: |
          VERSION="${GITHUB_REF#refs/tags/standalone-v}"
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="${GITHUB_SHA:0:7}"
          fi
          echo "VERSION=$VERSION" > dist-standalone/VERSION.txt
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist-standalone/VERSION.txt
          echo "BUILD_REF=$GITHUB_REF" >> dist-standalone/VERSION.txt

      - name: Show LITE build size
        run: du -sh dist-standalone

      - name: Create LITE archives
        run: |
          cd dist-standalone
          zip -r ../monkdb-workbench-standalone-lite.zip . -x "*.DS_Store"
          cd ..
          tar -czf monkdb-workbench-standalone-lite.tar.gz -C dist-standalone .
          echo "LITE ZIP: $(du -sh monkdb-workbench-standalone-lite.zip | cut -f1)"

      - name: Create FULL package (with node_modules)
        run: |
          cp -r dist-standalone dist-standalone-full
          cp -r node_modules dist-standalone-full/
          du -sh dist-standalone-full
          cd dist-standalone-full
          zip -r ../monkdb-workbench-standalone-full.zip . -x "*.DS_Store"
          cd ..
          tar -czf monkdb-workbench-standalone-full.tar.gz -C dist-standalone-full .
          echo "FULL ZIP: $(du -sh monkdb-workbench-standalone-full.zip | cut -f1)"

      - name: Calculate checksums
        run: |
          sha256sum monkdb-workbench-standalone-lite.zip    > monkdb-workbench-standalone-lite.zip.sha256
          sha256sum monkdb-workbench-standalone-lite.tar.gz >> monkdb-workbench-standalone-lite.zip.sha256
          sha256sum monkdb-workbench-standalone-full.zip    > monkdb-workbench-standalone-full.zip.sha256
          sha256sum monkdb-workbench-standalone-full.tar.gz >> monkdb-workbench-standalone-full.zip.sha256
          cat monkdb-workbench-standalone-lite.zip.sha256
          cat monkdb-workbench-standalone-full.zip.sha256

      - name: Upload LITE artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite
          path: |
            monkdb-workbench-standalone-lite.zip
            monkdb-workbench-standalone-lite.tar.gz
            monkdb-workbench-standalone-lite.zip.sha256

      - name: Upload FULL artifact
        uses: actions/upload-artifact@v4
        with:
          name: monkdb-workbench-standalone-full
          path: |
            monkdb-workbench-standalone-full.zip
            monkdb-workbench-standalone-full.tar.gz
            monkdb-workbench-standalone-full.zip.sha256

  # Upload to Cloudflare R2 when a tag is pushed
  upload-to-r2:
    name: Upload to Cloudflare R2
    needs: build-standalone
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/standalone-v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/standalone-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download LITE artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-lite
          path: release-files

      - name: Download FULL artifact
        uses: actions/download-artifact@v4
        with:
          name: monkdb-workbench-standalone-full
          path: release-files

      - name: Configure AWS CLI for R2
        run: |
          pip install awscli --quiet
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload versioned release to R2
        run: |
          V=${{ steps.version.outputs.version }}
          BASE="s3://${{ secrets.R2_BUCKET_NAME }}/releases"
          ENDPOINT="${{ secrets.R2_ENDPOINT }}"

          for FILE in \
            monkdb-workbench-standalone-lite.zip \
            monkdb-workbench-standalone-lite.tar.gz \
            monkdb-workbench-standalone-lite.zip.sha256 \
            monkdb-workbench-standalone-full.zip \
            monkdb-workbench-standalone-full.tar.gz \
            monkdb-workbench-standalone-full.zip.sha256; do
            aws s3 cp "release-files/$FILE" "$BASE/v$V/$FILE" \
              --endpoint-url "$ENDPOINT" --acl public-read
            aws s3 cp "release-files/$FILE" "$BASE/latest/$FILE" \
              --endpoint-url "$ENDPOINT" --acl public-read
          done
          echo "✅ Uploaded all files for v$V"

      - name: Upload download page
        run: |
          aws s3 cp download-page.html \
            s3://${{ secrets.R2_BUCKET_NAME }}/downloads/index.html \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, must-revalidate"
          echo "✅ Download page live"

  # Update download page on every push to main
  update-download-page:
    name: Update Download Page on R2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS CLI for R2
        run: |
          pip install awscli --quiet
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload download page to R2
        run: |
          aws s3 cp download-page.html \
            s3://${{ secrets.R2_BUCKET_NAME }}/downloads/index.html \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, must-revalidate"
          echo "✅ Download page updated"
