name: Build Standalone Package

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'standalone-v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-standalone:
    name: Build Standalone Web Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Show environment
        run: |
          node --version
          npm --version
          df -h

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build

      # ── Packaging + direct R2 upload — only on tag push ───────────────────────

      - name: Package standalone
        if: startsWith(github.ref, 'refs/tags/standalone-v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/standalone-v}"

          # ── LITE (no node_modules) ───────────────────────────────────────────
          mkdir -p dist-standalone
          cp -r .next dist-standalone/
          cp -r public dist-standalone/ 2>/dev/null || true
          cp package.json package-lock.json dist-standalone/

          cat > dist-standalone/server.js << 'SERVEREOF'
          const { createServer } = require('http');
          const { parse } = require('url');
          const next = require('next');
          const fs = require('fs');
          const path = require('path');
          function loadEnvFile(p) {
            if (!fs.existsSync(p)) return;
            fs.readFileSync(p,'utf8').split('\n').forEach(line => {
              line = line.trim();
              if (!line || line.startsWith('#')) return;
              const m = line.match(/^([^=]+)=(.*)/);
              if (m && !process.env[m[1].trim()]) process.env[m[1].trim()] = m[2].trim();
            });
          }
          ['.env','.env.local'].forEach(f => loadEnvFile(path.join(__dirname,f)));
          const port = parseInt(process.env.PORT||'3000',10);
          const app = next({ dev:false, hostname:'0.0.0.0', port, dir:__dirname });
          const handle = app.getRequestHandler();
          app.prepare().then(() => {
            createServer(async (req,res) => {
              try { await handle(req,res,parse(req.url,true)); }
              catch(e) { res.statusCode=500; res.end('error'); }
            }).listen(port, err => { if(err) throw err; console.log(`> http://localhost:${port}`); });
          });
          SERVEREOF

          printf '#!/bin/bash\n[ ! -d node_modules ] && npm ci --production --no-audit\nPORT=${PORT:-3000} NODE_ENV=production node server.js\n' > dist-standalone/start.sh
          chmod +x dist-standalone/start.sh
          printf '@echo off\nif not exist "node_modules\\" call npm ci --production --no-audit\nset NODE_ENV=production\nnode server.js\n' > dist-standalone/start.bat

          echo "VERSION=$VERSION" > dist-standalone/VERSION.txt
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> dist-standalone/VERSION.txt

          echo "LITE size: $(du -sh dist-standalone | cut -f1)"
          zip -r monkdb-workbench-standalone-lite.zip dist-standalone -x "*.DS_Store"
          tar -czf monkdb-workbench-standalone-lite.tar.gz dist-standalone
          echo "LITE ZIP: $(du -sh monkdb-workbench-standalone-lite.zip | cut -f1)"

          # ── FULL (with node_modules) ─────────────────────────────────────────
          cp -r dist-standalone dist-standalone-full
          cp -r node_modules dist-standalone-full/
          echo "FULL size: $(du -sh dist-standalone-full | cut -f1)"
          zip -r monkdb-workbench-standalone-full.zip dist-standalone-full -x "*.DS_Store"
          tar -czf monkdb-workbench-standalone-full.tar.gz dist-standalone-full
          echo "FULL ZIP: $(du -sh monkdb-workbench-standalone-full.zip | cut -f1)"

          # ── Checksums ────────────────────────────────────────────────────────
          sha256sum monkdb-workbench-standalone-lite.zip    > checksums.txt
          sha256sum monkdb-workbench-standalone-lite.tar.gz >> checksums.txt
          sha256sum monkdb-workbench-standalone-full.zip    >> checksums.txt
          sha256sum monkdb-workbench-standalone-full.tar.gz >> checksums.txt
          cat checksums.txt

      - name: Upload directly to R2
        if: startsWith(github.ref, 'refs/tags/standalone-v')
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          pip install awscli --quiet
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto

          VERSION="${GITHUB_REF#refs/tags/standalone-v}"
          BASE="s3://$R2_BUCKET_NAME/releases"

          for FILE in \
            monkdb-workbench-standalone-lite.zip \
            monkdb-workbench-standalone-lite.tar.gz \
            monkdb-workbench-standalone-full.zip \
            monkdb-workbench-standalone-full.tar.gz \
            checksums.txt; do
            echo "→ uploading $FILE"
            aws s3 cp "$FILE" "$BASE/v$VERSION/$FILE" --endpoint-url "$R2_ENDPOINT" --acl public-read
            aws s3 cp "$FILE" "$BASE/latest/$FILE"    --endpoint-url "$R2_ENDPOINT" --acl public-read
          done

          # Update download page
          aws s3 cp download-page.html \
            "s3://$R2_BUCKET_NAME/downloads/index.html" \
            --endpoint-url "$R2_ENDPOINT" \
            --acl public-read \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, must-revalidate"

          echo "✅ Released v$VERSION to R2"

  # ── Update download page on push to main (no artifact storage used) ──────────
  update-download-page:
    name: Update Download Page on R2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS CLI for R2
        run: |
          pip install awscli --quiet
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload download page
        run: |
          aws s3 cp download-page.html \
            s3://${{ secrets.R2_BUCKET_NAME }}/downloads/index.html \
            --endpoint-url ${{ secrets.R2_ENDPOINT }} \
            --acl public-read \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, must-revalidate"
          echo "✅ Download page updated"
